# EXP-3: Speculator-Aware Fine-Tuning (Core Experiment) — Llama
experiment_id: "EXP-3-Llama"
hypothesis: "H3 — KL regularization during fine-tuning preserves speculator acceptance rate (Llama models)"

models:
  target: "meta-llama/Llama-3.1-8B-Instruct"
  draft: "meta-llama/Llama-3.2-1B-Instruct"

domain: "code"

training:
  num_epochs: 1
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_seq_len: 1024
  max_samples: 10000
  scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  seed: 42

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

spec_loss:
  lam: 0.1
  loss_type: "kl"
  temperature: 1.0
  top_k: null

logging:
  log_every: 10
  save_checkpoints_every: 500
  measure_acceptance_every: 200

measurement:
  num_prompts_per_domain: 50
  max_new_tokens: 128
  draft_k: 5

output_dir: "results/exp3_llama_spec_aware_code_lam0.1"
