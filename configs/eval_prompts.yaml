medical_prompts:
  # --- Short (20 prompts) ---
  - "What are the classic signs and symptoms of diabetic ketoacidosis (DKA), and how does it differ from hyperosmolar hyperglycemic state (HHS)?"
  - "Explain the mechanism of action of metformin in treating type 2 diabetes mellitus."
  - "A 55-year-old male presents with sudden onset crushing chest pain radiating to the left arm, diaphoresis, and nausea. What is the most likely diagnosis and initial management?"
  - "Describe the pathophysiology of congestive heart failure and the rationale for using ACE inhibitors in treatment."
  - "What are the key differences between Crohn's disease and ulcerative colitis in terms of location, histology, and clinical features?"
  - "List the warning signs of stroke using the FAST mnemonic and explain the importance of the treatment time window."
  - "What is the difference between type I and type II hypersensitivity reactions? Give an example of each."
  - "Explain the renin-angiotensin-aldosterone system (RAAS) and its role in blood pressure regulation."
  - "A 30-year-old woman presents with fatigue, weight gain, cold intolerance, and constipation. What is the most likely diagnosis and what lab tests would you order?"
  - "What are the indications and contraindications for thrombolytic therapy in acute ischemic stroke?"
  - "Describe the Glasgow Coma Scale and how it is used to assess the level of consciousness in trauma patients."
  - "What is the pathophysiology of sickle cell disease, and what triggers a vaso-occlusive crisis?"
  - "Explain the difference between bacteriostatic and bactericidal antibiotics. Give two examples of each."
  - "A 4-year-old child presents with barking cough, inspiratory stridor, and a low-grade fever. What is the most likely diagnosis and treatment?"
  - "What are the stages of chronic kidney disease based on GFR, and at what stage is dialysis typically initiated?"
  - "Describe the mechanism by which NSAIDs cause peptic ulcers. What prophylactic measures can be taken?"
  - "What is the difference between osteoarthritis and rheumatoid arthritis in terms of pathogenesis, joint involvement, and treatment?"
  - "Explain the concept of herd immunity and calculate the threshold for a disease with R0 = 5."
  - "A patient on warfarin presents with an INR of 8.5 and minor gum bleeding. What is the appropriate management?"
  - "What are the first-line treatments for community-acquired pneumonia in an otherwise healthy adult?"

  # --- Medium (20 prompts) ---
  - "A 65-year-old male with a history of atrial fibrillation, hypertension, diabetes, and prior stroke presents for evaluation of his anticoagulation regimen. Calculate his CHA2DS2-VASc score and recommend an appropriate anticoagulation strategy. Discuss the pros and cons of warfarin versus direct oral anticoagulants."
  - "Explain the pathophysiology of acute respiratory distress syndrome (ARDS). Describe the Berlin criteria for diagnosis, the role of protective lung ventilation, and the evidence for prone positioning in severe ARDS."
  - "A 45-year-old woman presents with a 2 cm thyroid nodule found incidentally on ultrasound. Describe the Bethesda classification system for thyroid cytology and outline the management algorithm based on fine-needle aspiration results."
  - "Discuss the pharmacokinetics and pharmacodynamics of insulin. Compare the onset, peak, and duration of rapid-acting, short-acting, intermediate-acting, and long-acting insulin formulations. When would you use each?"
  - "A 28-year-old pregnant woman at 32 weeks gestation presents with blood pressure of 160/105 mmHg, proteinuria, and headache. Discuss the diagnosis, classification, management, and delivery timing considerations."
  - "Explain the tumor-node-metastasis (TNM) staging system for non-small cell lung cancer. How does staging influence treatment decisions between surgery, chemotherapy, radiation, and immunotherapy?"
  - "Describe the pathogenesis of type 1 diabetes mellitus from an immunological perspective. What autoantigens are targeted? What is the role of HLA genes? Discuss the potential for immunotherapy-based prevention strategies."
  - "A 70-year-old male with chronic atrial fibrillation develops sudden severe abdominal pain with minimal findings on physical examination. The classic description is 'pain out of proportion to exam.' What is the most likely diagnosis? Describe the diagnostic workup, including the role of CT angiography and lactate levels."
  - "Compare and contrast the mechanisms of action, side effects, and clinical applications of the four major classes of diuretics: loop diuretics, thiazides, potassium-sparing diuretics, and osmotic diuretics."
  - "A 35-year-old IV drug user presents with fever, new-onset heart murmur, Janeway lesions, and Osler nodes. Discuss the modified Duke criteria for infective endocarditis, appropriate blood culture technique, and empiric antibiotic regimen."
  - "Explain the concept of sepsis-3 criteria. How does the Sequential Organ Failure Assessment (SOFA) score work? What are the key components of the surviving sepsis campaign's hour-1 bundle?"
  - "Describe the physiological changes that occur during pregnancy in each organ system: cardiovascular, respiratory, renal, hematologic, and endocrine. How do these changes affect drug dosing?"
  - "A 60-year-old male presents with progressive difficulty swallowing solids, then liquids, over 6 months with 15 kg weight loss. Discuss the differential diagnosis, diagnostic approach, and staging workup for esophageal carcinoma."
  - "Explain the pharmacology of neuromuscular blocking agents. Differentiate between depolarizing and non-depolarizing agents. Describe the risks of succinylcholine, including malignant hyperthermia and hyperkalemia."
  - "A 22-year-old female presents with recurrent deep vein thrombosis. She has a family history of blood clots. Describe the workup for inherited thrombophilia, including Factor V Leiden, prothrombin gene mutation, and antiphospholipid syndrome."
  - "Discuss the pathophysiology of hepatorenal syndrome. What are the diagnostic criteria? Explain the role of terlipressin and albumin in treatment, and when is TIPS indicated?"
  - "A patient presents with polyuria, polydipsia, and hypernatremia. The urine osmolality is low. Describe how you would differentiate between central diabetes insipidus, nephrogenic diabetes insipidus, and primary polydipsia using the water deprivation test and desmopressin challenge."
  - "Explain the molecular basis of antibiotic resistance in MRSA. Describe the mecA gene and PBP2a. What are the treatment options for MRSA bacteremia, and why is vancomycin trough monitoring important?"
  - "Discuss the pathophysiology of acute pancreatitis. Compare the Ranson criteria and the BISAP score for severity prediction. What is the role of early aggressive fluid resuscitation and when is surgical intervention indicated?"
  - "A 50-year-old male presents with hematemesis and is found to have esophageal varices on endoscopy. Discuss the pathophysiology of portal hypertension, the role of non-selective beta-blockers for primary prophylaxis, and the acute management including vasoactive drugs, endoscopic band ligation, and TIPS."

  # --- Long (10 prompts) ---
  - "Present a comprehensive case analysis: A 72-year-old female with diabetes, hypertension, and stage 3 CKD is admitted with acute decompensated heart failure (EF 25%). She is on metformin, lisinopril, amlodipine, and atorvastatin. Her creatinine has risen from 1.8 to 2.9 mg/dL, potassium is 5.8, and BNP is 2400. Discuss the management of acute decompensated heart failure with cardiorenal syndrome, medication adjustments needed given her renal function, and the long-term prognosis and goals of care discussion."
  - "A 45-year-old male presents with a 3-month history of unintentional weight loss (20 lbs), night sweats, and a mediastinal mass on chest X-ray. CT shows a large anterior mediastinal mass with areas of calcification. Discuss the differential diagnosis of anterior mediastinal masses (the 4 Ts), the diagnostic workup including biopsy approaches, and the management plan if this is found to be a non-seminomatous germ cell tumor with elevated AFP and beta-hCG."
  - "Provide a detailed explanation of the coagulation cascade, including both the intrinsic and extrinsic pathways. Describe how PT, PTT, and INR relate to each pathway. Explain the mechanism of action of heparin, low-molecular-weight heparin, warfarin, and direct oral anticoagulants. For each, discuss monitoring parameters, reversal agents, and indications. Include the role of the fibrinolytic system and how TPA works."
  - "A 30-year-old female presents with bilateral joint pain, malar rash, photosensitivity, oral ulcers, and positive ANA. Discuss the updated ACR/EULAR classification criteria for systemic lupus erythematosus. Describe the immunopathogenesis involving immune complex deposition and complement activation. Outline the management strategy stratified by disease severity, including hydroxychloroquine, corticosteroids, mycophenolate, cyclophosphamide, and belimumab. Discuss lupus nephritis classification and its impact on treatment decisions."
  - "Describe the complete pathophysiology of diabetic nephropathy from the earliest hemodynamic changes (glomerular hyperfiltration) through mesangial expansion, basement membrane thickening, nodular glomerulosclerosis (Kimmelstiel-Wilson nodules), and eventually end-stage renal disease. Discuss the roles of hyperglycemia, advanced glycation end products, the polyol pathway, and protein kinase C activation. Explain the evidence for SGLT2 inhibitors and GLP-1 receptor agonists in renal protection beyond glucose lowering."
  - "A previously healthy 8-year-old boy is brought to the emergency department with sudden onset of purpuric rash on the lower extremities and buttocks, abdominal pain, joint swelling, and tea-colored urine. Discuss the diagnosis of IgA vasculitis (Henoch-Schonlein purpura), its pathogenesis involving IgA immune complex deposition, the diagnostic criteria, complications including intussusception and nephritis, management strategies, and long-term renal monitoring recommendations."
  - "Explain the genetics, pathophysiology, and management of familial hypercholesterolemia (FH). Compare heterozygous and homozygous forms. Describe the role of LDL receptor mutations, PCSK9 gain-of-function mutations, and ApoB-100 defects. Discuss cascade screening strategies, when to start treatment in children, and the evidence for statins, ezetimibe, PCSK9 inhibitors (evolocumab, alirocumab), bempedoic acid, and inclisiran. What cardiovascular risk reduction is achieved with each therapy?"
  - "A 55-year-old male with cirrhosis secondary to hepatitis C is admitted with confusion, asterixis, and elevated ammonia level of 180. He was recently started on a proton pump inhibitor and had a large protein meal. Discuss the pathophysiology of hepatic encephalopathy including the role of ammonia, gut-derived neurotoxins, astrocyte swelling, and neuroinflammation. Describe the West Haven criteria for grading. Outline the management with lactulose and rifaximin, precipitant identification and reversal, nutritional considerations, and the role of liver transplant evaluation."
  - "Present a comprehensive review of the acute management of status epilepticus in adults. Define status epilepticus and convulsive vs non-convulsive forms. Describe the time-dependent treatment protocol: benzodiazepines (0-5 minutes), second-line agents like levetiracetam, fosphenytoin, and valproate (5-20 minutes), and refractory status requiring continuous infusions of propofol, midazolam, or ketamine (>20 minutes). Discuss the role of continuous EEG monitoring, the importance of identifying underlying etiology, and the concept of super-refractory status epilepticus."
  - "Discuss the immunology of organ transplantation. Explain HLA matching, crossmatch testing, and panel reactive antibody (PRA). Describe the types of rejection: hyperacute (antibody-mediated), acute cellular, acute antibody-mediated, and chronic rejection. Explain the mechanisms of each and how they appear on biopsy. Discuss the standard immunosuppression protocol (induction with basiliximab or thymoglobulin, maintenance with tacrolimus, mycophenolate, and prednisone). Address the long-term complications including opportunistic infections, malignancy risk, and nephrotoxicity from calcineurin inhibitors."

chat_prompts:
  # --- Short (20 prompts) ---
  - "Explain quantum computing to a 10-year-old. Use simple analogies and avoid technical jargon."
  - "Write a short story about a robot who discovers it can dream. Make it exactly three paragraphs."
  - "What are the pros and cons of remote work? Give a balanced perspective with specific examples."
  - "I'm learning to cook. Can you suggest a weekly meal plan for a complete beginner on a tight budget?"
  - "Explain the difference between machine learning, deep learning, and artificial intelligence in plain English."
  - "Write a professional email declining a job offer while maintaining a good relationship with the company."
  - "What would happen if the Earth suddenly stopped rotating? Describe the immediate and long-term effects."
  - "I need to give a best man speech at my brother's wedding. Give me tips and a template to follow."
  - "Compare and contrast the philosophies of Stoicism and Existentialism. Which is more relevant today?"
  - "Explain how a car engine works, step by step, as if I've never seen one before."
  - "Write a haiku about each of the four seasons. Then explain the 5-7-5 syllable structure."
  - "What are the most effective study techniques according to cognitive science research?"
  - "I'm moving to a new city where I don't know anyone. How do I build a social circle from scratch?"
  - "Explain the concept of inflation in economics. Why is some inflation considered healthy?"
  - "Write a persuasive argument for why space exploration is worth the investment, addressing common counterarguments."
  - "What are the key differences between leadership and management? Can someone be good at one but not the other?"
  - "Describe the water cycle in a way that would be engaging for a middle school science class."
  - "I want to start journaling but don't know where to begin. Give me a structured approach with prompts."
  - "Explain blockchain technology without using any technical terms. Use a real-world analogy."
  - "What are the psychological principles behind effective negotiation? Give practical tips for salary negotiation."

  # --- Medium (20 prompts) ---
  - "I'm a software engineer considering transitioning to product management. What skills transfer well, what new skills do I need to develop, and what's the best way to make this transition without taking a step back in my career? Include specific resources and a timeline."
  - "Explain the trolley problem and its major variations (fat man, loop track, transplant). Then discuss how different ethical frameworks (utilitarianism, deontology, virtue ethics) would approach each variation. What does this thought experiment reveal about moral intuitions?"
  - "Write a detailed guide for someone who wants to learn photography. Cover the exposure triangle (aperture, shutter speed, ISO), composition rules, and common mistakes beginners make. Recommend equipment for different budgets."
  - "I'm a manager and one of my top performers just told me they're burned out and considering quitting. How should I handle this conversation? What can I offer beyond just telling them to take a vacation? Provide a structured approach with specific interventions."
  - "Compare the education systems of Finland, Singapore, and the United States. What does each do well and poorly? If you could design an ideal education system taking the best elements from each, what would it look like?"
  - "Explain the history and science of coffee, from the discovery of coffee beans in Ethiopia to the third-wave coffee movement. Include the chemistry of roasting and brewing, and why different brewing methods produce different flavors."
  - "I need to create a personal budget for the first time. I earn $65,000 per year, live in a medium-cost city, have $25,000 in student loans, and want to start investing. Walk me through setting up a budget using the zero-based budgeting method."
  - "Write a thoughtful analysis of how social media has changed the way we form and maintain relationships. Consider both positive effects (staying connected, finding communities) and negative effects (comparison, superficiality, echo chambers). Cite specific research findings."
  - "I want to train for a marathon but I've never run more than 2 miles. Create a detailed 20-week training plan that includes weekly mileage, cross-training, rest days, nutrition advice, and injury prevention strategies."
  - "Explain the concept of entropy in thermodynamics, information theory, and everyday life. How are these different uses of the word connected? Why does entropy always increase, and what does this mean for the ultimate fate of the universe?"
  - "I'm starting a small business selling handmade candles online. Walk me through everything I need to do: business structure (LLC vs sole proprietorship), permits, pricing strategy, online store setup, marketing, and shipping logistics."
  - "Discuss the ethical implications of CRISPR gene editing technology. Consider therapeutic uses (curing genetic diseases), enhancement uses (designer babies), ecological uses (gene drives to eliminate malaria), and the concept of informed consent for future generations."
  - "Write a comprehensive guide to improving public speaking skills. Cover techniques for managing anxiety, structuring a talk, using body language effectively, handling Q&A sessions, and practicing deliberately. Include exercises the reader can do this week."
  - "Explain how the global supply chain works, using a smartphone as an example. Trace the journey from raw materials (rare earth minerals, silicon) through manufacturing, assembly, shipping, and retail. What are the vulnerabilities in this system?"
  - "I'm 25 years old and just started my first full-time job. Explain retirement planning as if I know nothing about finance. Cover 401(k), IRA, Roth vs traditional, index funds, compound interest, and how much I should be saving."
  - "Analyze the impact of the printing press on European society in the 15th-16th centuries. Draw parallels to how the internet has transformed modern society. What patterns are similar? What is fundamentally different?"
  - "I have a difficult coworker who frequently takes credit for my ideas in meetings and undermines my contributions. How should I address this professionally? Provide specific scripts for different scenarios and escalation strategies."
  - "Explain the science of sleep: the stages of sleep, circadian rhythms, the role of melatonin and adenosine, why we dream, and the health consequences of chronic sleep deprivation. Then provide evidence-based tips for improving sleep quality."
  - "Write a detailed comparison of different approaches to learning a new language: classroom instruction, immersion, apps (Duolingo, etc.), tutoring, and self-study with textbooks. What does the research say about which methods are most effective and why?"
  - "Discuss the concept of cognitive biases and how they affect decision-making. Cover at least 10 major biases (anchoring, confirmation bias, availability heuristic, etc.) with real-world examples. How can someone actively counteract these biases?"

  # --- Long (10 prompts) ---
  - "I'm a college student who just discovered that my chosen major (English Literature) might not lead to the career stability I want. I love writing and analysis but I'm worried about job prospects. Give me a comprehensive career planning framework: how to assess my skills and interests, careers that value strong writing (beyond just 'be a writer'), how to build marketable skills alongside my degree, networking strategies, and how to make this decision without regret."
  - "Write a detailed essay exploring the philosophical question: 'Is free will an illusion?' Present the determinist argument (every event is caused by prior events), the libertarian free will argument, compatibilism (soft determinism), and the implications of quantum mechanics. Discuss how neuroscience experiments like the Libet experiment inform this debate. Conclude with your analysis of what practical difference it makes to our lives whether free will exists or not."
  - "I want to understand climate change comprehensively. Explain the greenhouse effect, the evidence for anthropogenic climate change, the major feedback loops (ice-albedo, water vapor, permafrost methane), tipping points, the IPCC scenarios, and the most promising mitigation strategies (renewable energy, carbon capture, nuclear, geoengineering). Address common skeptic arguments with data. Be thorough but accessible to a non-scientist."
  - "Design a comprehensive personal development plan for someone in their early 30s who feels stuck in life. Cover: self-assessment techniques, goal-setting frameworks (SMART, OKRs for personal life), habit formation (atomic habits approach), physical health optimization, mental health maintenance, relationship building, career development, financial planning, and creating a meaningful daily routine. Make it actionable with specific weekly and monthly milestones."
  - "Explain the history of artificial intelligence from its inception at the Dartmouth Conference in 1956 to the present day. Cover the AI winters, expert systems, the rise of machine learning, deep learning breakthroughs (AlexNet, transformers, GPT), and current debates about AGI. Discuss the key figures (Turing, McCarthy, Minsky, Hinton, LeCun, Bengio, Sutskever) and their contributions. What are the most important open problems in AI today?"
  - "I'm planning to renovate my first home (a 1960s ranch-style house). I have a budget of $50,000. Walk me through the entire process: how to prioritize renovations for maximum ROI, when to DIY vs hire professionals, how to find and vet contractors, understanding permits and building codes, common mistakes first-time renovators make, a realistic timeline, and how to handle unexpected issues. Focus on kitchen, bathroom, and energy efficiency improvements."
  - "Write a thorough analysis of the gig economy (Uber, DoorDash, Fiverr, Upwork, etc.). Discuss its growth drivers, how it has changed the nature of work, the debate over worker classification (employee vs independent contractor), the impact on traditional industries, the role of algorithms in managing workers, international comparisons of regulation, and predictions for how this sector will evolve over the next decade. Consider perspectives of workers, companies, consumers, and regulators."
  - "I'm a parent of a 13-year-old and I'm struggling with how to approach technology and social media in our household. My child wants a smartphone and social media accounts, and all their friends have them. Provide a comprehensive, evidence-based guide covering: the documented psychological effects of social media on adolescents, age-appropriate technology guidelines, how to have productive conversations about digital citizenship, monitoring vs trust, setting boundaries that don't create resentment, and preparing them for the digital world they'll navigate as adults."
  - "Explore the concept of consciousness from multiple disciplinary perspectives. Discuss the hard problem of consciousness (Chalmers), integrated information theory (Tononi), global workspace theory (Baars), higher-order theories, and the philosophical zombie thought experiment. Consider animal consciousness and the question of machine consciousness. What would it take to scientifically prove that an AI system is conscious? Is consciousness an emergent property, a fundamental feature of the universe (panpsychism), or something else entirely?"
  - "Write a comprehensive guide to understanding and navigating the modern job market. Cover: how applicant tracking systems work and how to optimize resumes for them, the role of LinkedIn and networking in modern job searching, how to prepare for behavioral and technical interviews, negotiating compensation packages (not just salary but equity, benefits, signing bonuses), evaluating company culture during the interview process, when to accept vs decline an offer, and how to manage the first 90 days at a new job. Include specific templates and scripts."

