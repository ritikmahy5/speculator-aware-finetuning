# EXP-7: Complementarity with Runtime Adaptation
experiment_id: "EXP-7"
hypothesis: "H7 — Spec-aware FT + ATLAS adaptation > standard FT + ATLAS adaptation"

models:
  target: "Qwen/Qwen2.5-7B-Instruct"
  draft: "Qwen/Qwen2.5-0.5B-Instruct"

domain: "code"

adaptation:
  num_generated_outputs: 1000
  max_new_tokens: 256
  draft_finetune_steps: [100, 200, 500, 1000]
  draft_lr: 5.0e-5
  draft_batch_size: 8

# Compare two pipelines:
# 1. standard_ft_model + adapted_draft
# 2. spec_aware_ft_model + adapted_draft

measurement:
  num_prompts_per_domain: 50
  max_new_tokens: 128
  draft_k: 5

output_dir: "results/exp7"
