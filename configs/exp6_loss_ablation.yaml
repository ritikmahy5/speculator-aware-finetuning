# EXP-6: Loss Function Ablation
experiment_id: "EXP-6"
hypothesis: "H6 — Alternative divergence measures (JS, TV) may outperform KL"

models:
  target: "meta-llama/Llama-3.1-8B-Instruct"
  draft: "meta-llama/Llama-3.2-1B-Instruct"

domain: "code"

# Fix lambda at optimal value from EXP-4
loss_variants:
  - "kl"
  - "reverse_kl"
  - "js"
  - "tv"
  - "token_match"

training:
  num_epochs: 1
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_seq_len: 1024
  max_samples: 10000
  scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  seed: 42

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

spec_loss:
  lam: 0.1  # will be overridden with EXP-4 optimal
  loss_type: "kl"  # will be overridden per run
  temperature: 1.0
  top_k: null

measurement:
  num_prompts_per_domain: 50
  max_new_tokens: 128
  draft_k: 5

output_dir: "results/exp6"
